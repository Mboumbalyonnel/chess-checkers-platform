version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: chess-checkers-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=chess-checkers-db
    networks:
      - chess-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chess-checkers-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/chess-checkers-db
      - JWT_SECRET=votre_secret_jwt_super_securise
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - chess-network
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chess-checkers-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - chess-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  chess-network:
    driver: bridge
